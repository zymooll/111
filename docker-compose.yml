name: campus-foodie

services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: campus_foodie
      POSTGRES_USER: campus_foodie
      POSTGRES_PASSWORD: campus_foodie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_foodie -d campus_foodie"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://campus_foodie:campus_foodie@db:5432/campus_foodie
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-before-production}
      AUTO_SEED: ${AUTO_SEED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
      USER_WEB_ORIGIN: ${USER_WEB_ORIGIN:-http://localhost:5173}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: ${MAIL_FROM:-Campus Foodie <no-reply@campus-foodie.local>}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/runtime/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  uploads:
