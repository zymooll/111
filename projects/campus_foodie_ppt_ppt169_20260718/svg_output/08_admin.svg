<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FBFFF7" />
    <rect x="36" y="112" width="1208" height="552" rx="32" fill="#EAF7EF" />
  </g>
  <g id="header">
    <text x="56" y="64" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="34" font-weight="800" fill="#182026">后台保证可治理</text>
    <text x="56" y="96" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="700" fill="#4D5A57">商家、菜品和评价都可维护，每次操作都有记录。</text>
    <text x="1224" y="72" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#74807C">08 / 16</text>
  </g>
  <g id="desktop-dashboard">
    <rect x="70" y="150" width="780" height="470" rx="28" fill="#4D5A57" />
    <rect x="84" y="166" width="752" height="438" rx="20" fill="#FFFFFF" />
    <rect x="84" y="166" width="168" height="438" rx="20" fill="#1F8A70" />
    <rect x="84" y="572" width="168" height="32" fill="#1F8A70" />
    <use data-icon="phosphor-duotone/desktop" x="118" y="208" width="34" height="34" fill="#FFFFFF" />
    <text x="162" y="231" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">Admin</text>
    <g id="admin-nav">
      <rect x="112" y="284" width="122" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.20" />
      <text x="142" y="306" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">评价审核</text>
      <text x="142" y="354" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.84">商家菜品</text>
      <text x="142" y="402" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.84">批量导入</text>
      <text x="142" y="450" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.84">操作记录</text>
    </g>
    <g id="dashboard-content">
      <text x="292" y="230" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" font-weight="800" fill="#182026">评价审核队列</text>
      <rect x="650" y="206" width="132" height="36" rx="18" fill="#EAF7EF" />
      <text x="716" y="229" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="800" fill="#1F8A70">待处理 12</text>
      <line x1="292" y1="270" x2="792" y2="270" stroke="#DCEBE3" stroke-width="2" />
      <rect x="292" y="298" width="500" height="54" rx="14" fill="#FBFFF7" stroke="#BFD9CC" stroke-width="1" />
      <text x="314" y="326" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="800" fill="#182026">藤椒鸡双拼饭 · 五星评价</text>
      <text x="314" y="346" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#4D5A57">图片 1 张 · 规则通过 · 等待人工确认</text>
      <rect x="692" y="312" width="74" height="24" rx="12" fill="#1F8A70" />
      <text x="729" y="328" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" font-weight="800" fill="#FFFFFF">通过</text>
      <rect x="292" y="370" width="500" height="54" rx="14" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1" />
      <text x="314" y="398" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="800" fill="#182026">商家地图选点更新</text>
      <text x="314" y="418" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#4D5A57">位置记录 · 管理员维护</text>
      <rect x="692" y="384" width="74" height="24" rx="12" fill="#EAF7EF" />
      <text x="729" y="400" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" font-weight="800" fill="#1F8A70">追踪</text>
      <rect x="292" y="442" width="500" height="92" rx="14" fill="#FBFFF7" stroke="#BFD9CC" stroke-width="1" />
      <text x="314" y="470" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="800" fill="#182026">导入前检查</text>
      <rect x="314" y="488" width="442" height="24" rx="12" fill="#EAF7EF" />
      <rect x="314" y="488" width="330" height="24" rx="12" fill="#22A06B" />
      <text x="770" y="505" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#4D5A57">字段 / 行级错误先返回，再导入</text>
    </g>
  </g>
  <g id="right-governance-stack">
    <rect x="890" y="156" width="318" height="120" rx="24" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
    <use data-icon="phosphor-duotone/clipboard-text" x="920" y="188" width="42" height="42" fill="#1F8A70" />
    <text x="980" y="198" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="800" fill="#182026">评价审核</text>
    <text x="980" y="228" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">通过、驳回、隐藏都写明原因</text>
    <rect x="890" y="306" width="318" height="120" rx="24" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
    <use data-icon="phosphor-duotone/list-checks" x="920" y="338" width="42" height="42" fill="#3A86FF" />
    <text x="980" y="348" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="800" fill="#182026">数据导入</text>
    <text x="980" y="378" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">导入前先检查，避免错误数据</text>
    <rect x="890" y="456" width="318" height="120" rx="24" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
    <use data-icon="phosphor-duotone/shield-check" x="920" y="488" width="42" height="42" fill="#FFB703" />
    <text x="980" y="498" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="800" fill="#182026">操作记录</text>
    <text x="980" y="528" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">操作者、对象、时间、变更可追踪</text>
  </g>
  <g id="footer">
    <text x="56" y="690" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#74807C">管理员后台 · 维护、审核与导入</text>
  </g>
</svg>
