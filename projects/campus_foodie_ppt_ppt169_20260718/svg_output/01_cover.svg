    <rect x="584" y="158" width="146" height="312" rx="24" fill="#FFFFFF" />
    <rect x="608" y="184" width="98" height="18" rx="9" fill="#DCEBE3" />
    <rect x="604" y="226" width="106" height="28" rx="14" fill="#EAF7EF" />
    <rect x="604" y="270" width="106" height="74" rx="16" fill="#FBFFF7" stroke="#BFD9CC" stroke-width="1" />
    <use data-icon="phosphor-duotone/bowl-food" x="616" y="286" width="36" height="36" fill="#FFB703" />
    <text x="660" y="298" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" font-weight="800" fill="#182026">
      <tspan x="660" dy="0">藤椒鸡</tspan>
      <tspan x="660" dy="16">双拼饭</tspan>
    </text>
    <text x="660" y="333" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="10" fill="#4D5A57">微辣 · ¥18</text>
    <rect x="604" y="356" width="106" height="58" rx="14" fill="#EAF7EF" />
    <text x="618" y="383" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#1F8A70">推荐理由</text>
    <text x="618" y="403" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="10" fill="#4D5A57">近图书馆，口味匹配</text>
  </g>
  <g id="footer">
    <line x1="56" y1="652" x2="1224" y2="652" stroke="#BFD9CC" stroke-width="1" />
    <text x="56" y="682" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#74807C">Campus Foodie · 校园饮食推荐路演</text>
    <text x="1224" y="682" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#74807C">01 / 16</text>
  </g>
