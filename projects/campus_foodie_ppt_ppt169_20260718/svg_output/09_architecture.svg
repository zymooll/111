<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowReq" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3A86FF" />
    </marker>
    <marker id="arrowResp" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1F8A70" />
    </marker>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FBFFF7" />
  </g>
  <g id="header">
    <text x="56" y="62" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="34" font-weight="800" fill="#182026">模块化单体，边界清晰</text>
    <text x="56" y="94" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="700" fill="#4D5A57">初版用前后端分离保证开发效率，同时保留服务拆分边界。</text>
    <text x="1224" y="72" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#74807C">09 / 16</text>
  </g>
  <g id="client-zone">
    <rect x="56" y="130" width="292" height="480" rx="24" fill="#EAF7EF" stroke="#BFD9CC" stroke-width="1.5" />
    <rect x="56" y="130" width="292" height="48" rx="24" fill="#3A86FF" />
    <rect x="56" y="154" width="292" height="24" fill="#3A86FF" />
    <text x="202" y="162" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">CLIENTS</text>
    <g id="client-user">
      <rect x="86" y="220" width="232" height="118" rx="18" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1" />
      <use data-icon="phosphor-duotone/device-mobile" x="110" y="246" width="38" height="38" fill="#3A86FF" />
      <text x="164" y="256" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="800" fill="#182026">学生使用的网页</text>
      <text x="164" y="284" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#4D5A57">学生入口</text>
      <text x="110" y="318" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#74807C">推荐、搜索、地图、评价、我的</text>
    </g>
    <g id="client-admin">
      <rect x="86" y="388" width="232" height="118" rx="18" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1" />
      <use data-icon="phosphor-duotone/desktop" x="110" y="414" width="38" height="38" fill="#1F8A70" />
      <text x="164" y="424" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="800" fill="#182026">管理端 React Web</text>
      <text x="164" y="452" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#4D5A57">管理入口</text>
      <text x="110" y="486" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#74807C">用户、商家、菜品、审核、导入</text>
    </g>
  </g>
  <g id="api-zone">
    <rect x="496" y="194" width="288" height="352" rx="28" fill="#FFFFFF" stroke="#1F8A70" stroke-width="3" />
    <rect x="530" y="228" width="80" height="80" rx="24" fill="#EAF7EF" />
    <use data-icon="phosphor-duotone/gear-six" x="550" y="248" width="40" height="40" fill="#1F8A70" />
    <text x="632" y="258" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="24" font-weight="800" fill="#182026">后端服务</text>
    <text x="632" y="292" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="700" fill="#74807C">统一处理请求</text>
    <line x1="532" y1="334" x2="748" y2="334" stroke="#DCEBE3" stroke-width="2" />
    <text x="532" y="370" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">认证 / 推荐 / 地图 / 评价</text>
    <text x="532" y="402" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">目录 / 收藏 / 个人中心</text>
    <text x="532" y="434" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">管理接口 /admin/api/v1</text>
    <rect x="532" y="472" width="216" height="38" rx="19" fill="#EAF7EF" />
    <text x="640" y="496" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="800" fill="#1F8A70">共享业务库，校园和权限隔离</text>
  </g>
  <g id="server-zone">
    <rect x="932" y="130" width="292" height="480" rx="24" fill="#EAF7EF" stroke="#BFD9CC" stroke-width="1.5" />
    <rect x="932" y="130" width="292" height="48" rx="24" fill="#1F8A70" />
    <rect x="932" y="154" width="292" height="24" fill="#1F8A70" />
    <text x="1078" y="162" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">DATA AND SERVICES</text>
    <g id="service-db">
      <rect x="962" y="206" width="232" height="72" rx="16" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1" />
      <use data-icon="phosphor-duotone/database" x="984" y="224" width="34" height="34" fill="#1F8A70" />
      <text x="1030" y="234" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">餐饮信息库</text>
      <text x="1030" y="258" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#74807C">开发存储与生产扩展</text>
    </g>
    <g id="service-ai">
      <rect x="962" y="302" width="232" height="72" rx="16" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1" />
      <use data-icon="phosphor-duotone/brain" x="984" y="320" width="34" height="34" fill="#3A86FF" />
      <text x="1030" y="330" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">AI 推荐助手</text>
      <text x="1030" y="354" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#74807C">调整推荐顺序与辅助审核</text>
    </g>
    <g id="service-map">
      <rect x="962" y="398" width="232" height="72" rx="16" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1" />
      <use data-icon="phosphor-duotone/map-pin" x="984" y="416" width="34" height="34" fill="#FFB703" />
      <text x="1030" y="426" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">地图与图片存储</text>
      <text x="1030" y="450" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#74807C">地图服务可选，失效仍可浏览</text>
    </g>
    <g id="service-mail">
      <rect x="962" y="494" width="232" height="72" rx="16" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1" />
      <use data-icon="phosphor-duotone/cloud-check" x="984" y="512" width="34" height="34" fill="#22A06B" />
      <text x="1030" y="522" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">邮件通知</text>
      <text x="1030" y="546" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#74807C">邮箱验证与密码找回</text>
    </g>
  </g>
  <g id="interactions">
    <line x1="348" y1="276" x2="492" y2="276" stroke="#3A86FF" stroke-width="3" marker-end="url(#arrowReq)" />
    <rect x="376" y="244" width="96" height="24" rx="12" fill="#FFFFFF" stroke="#3A86FF" stroke-width="1" />
    <text x="424" y="261" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="800" fill="#3A86FF">/api/v1</text>
    <line x1="348" y1="444" x2="492" y2="444" stroke="#3A86FF" stroke-width="3" marker-end="url(#arrowReq)" />
    <rect x="360" y="412" width="130" height="24" rx="12" fill="#FFFFFF" stroke="#3A86FF" stroke-width="1" />
    <text x="425" y="429" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="800" fill="#3A86FF">/admin/api/v1</text>
    <line x1="784" y1="276" x2="928" y2="276" stroke="#1F8A70" stroke-width="3" marker-end="url(#arrowResp)" />
    <rect x="810" y="244" width="92" height="24" rx="12" fill="#FFFFFF" stroke="#1F8A70" stroke-width="1" />
    <text x="856" y="261" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="800" fill="#1F8A70">读写数据</text>
    <line x1="784" y1="368" x2="928" y2="368" stroke="#3A86FF" stroke-width="3" marker-end="url(#arrowReq)" />
    <rect x="802" y="336" width="108" height="24" rx="12" fill="#FFFFFF" stroke="#3A86FF" stroke-width="1" />
    <text x="856" y="353" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="800" fill="#3A86FF">AI 重排审核</text>
    <line x1="784" y1="458" x2="928" y2="458" stroke="#1F8A70" stroke-width="3" marker-end="url(#arrowResp)" />
    <rect x="804" y="426" width="104" height="24" rx="12" fill="#FFFFFF" stroke="#1F8A70" stroke-width="1" />
    <text x="856" y="443" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="800" fill="#1F8A70">可选增强</text>
  </g>
  <g id="footer">
    <text x="56" y="682" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#74807C">Blue = request / enhancement · Green = data or stable response</text>
  </g>
</svg>
