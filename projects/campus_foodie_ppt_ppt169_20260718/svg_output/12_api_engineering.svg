<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FBFFF7" />
  </g>
  <g id="header">
    <text x="56" y="64" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="34" font-weight="800" fill="#182026">工程细节保护体验</text>
    <text x="56" y="96" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="700" fill="#4D5A57">校园隔离、游标分页、幂等写入和统一错误格式，让系统在真实网络里更稳。</text>
    <text x="1224" y="72" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#74807C">12 / 16</text>
  </g>
  <g id="pillar-campus">
    <rect x="70" y="142" width="268" height="488" rx="22" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
    <path d="M 92 142 H 316 A 22 22 0 0 1 338 164 V 258 H 70 V 164 A 22 22 0 0 1 92 142 Z" fill="#EAF7EF" />
    <text x="204" y="202" text-anchor="middle" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="48" font-weight="800" fill="#1F8A70">01</text>
    <text x="204" y="238" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="800" fill="#182026">校园隔离</text>
    <use data-icon="phosphor-duotone/arrows-merge" x="98" y="294" width="36" height="36" fill="#1F8A70" />
    <text x="148" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="800" fill="#182026">资源先绑定校园</text>
    <text x="100" y="364" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">
      <tspan x="100" dy="0">服务端校验引用资源是否</tspan>
      <tspan x="100" dy="26">属于同一校园，避免只靠</tspan>
      <tspan x="100" dy="26">前端筛选造成数据越界。</tspan>
    </text>
    <rect x="100" y="522" width="208" height="44" rx="14" fill="#EAF7EF" />
    <text x="204" y="550" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700" fill="#1F8A70">campus_id</text>
  </g>
  <g id="pillar-cursor">
    <rect x="366" y="142" width="268" height="488" rx="22" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
    <path d="M 388 142 H 612 A 22 22 0 0 1 634 164 V 258 H 366 V 164 A 22 22 0 0 1 388 142 Z" fill="#EAF7EF" />
    <text x="500" y="202" text-anchor="middle" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="48" font-weight="800" fill="#3A86FF">02</text>
    <text x="500" y="238" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="800" fill="#182026">游标分页</text>
    <use data-icon="phosphor-duotone/path" x="394" y="294" width="36" height="36" fill="#3A86FF" />
    <text x="444" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">持续加载不依赖 offset</text>
    <text x="396" y="364" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">
      <tspan x="396" dy="0">推荐流、评价和后台列表</tspan>
      <tspan x="396" dy="26">使用不透明游标，减少</tspan>
      <tspan x="396" dy="26">新增数据带来的重复遗漏。</tspan>
    </text>
    <rect x="396" y="522" width="208" height="44" rx="14" fill="#EAF7EF" />
    <text x="500" y="550" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700" fill="#3A86FF">next_cursor</text>
  </g>
  <g id="pillar-idempotent">
    <rect x="662" y="142" width="268" height="488" rx="22" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
    <path d="M 684 142 H 908 A 22 22 0 0 1 930 164 V 258 H 662 V 164 A 22 22 0 0 1 684 142 Z" fill="#EAF7EF" />
    <text x="796" y="202" text-anchor="middle" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="48" font-weight="800" fill="#FFB703">03</text>
    <text x="796" y="238" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="800" fill="#182026">幂等写入</text>
    <use data-icon="phosphor-duotone/check-circle" x="690" y="294" width="36" height="36" fill="#22A06B" />
    <text x="740" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">移动网络重试也安全</text>
    <text x="692" y="364" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">
      <tspan x="692" dy="0">相同键和相同请求重放</tspan>
      <tspan x="692" dy="26">原响应；相同键不同内容</tspan>
      <tspan x="692" dy="26">返回 409。</tspan>
    </text>
    <rect x="692" y="522" width="208" height="44" rx="14" fill="#EAF7EF" />
    <text x="796" y="550" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="700" fill="#1F8A70">Idempotency-Key</text>
  </g>
  <g id="pillar-problem">
    <rect x="958" y="142" width="252" height="488" rx="22" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
    <path d="M 980 142 H 1188 A 22 22 0 0 1 1210 164 V 258 H 958 V 164 A 22 22 0 0 1 980 142 Z" fill="#EAF7EF" />
    <text x="1084" y="202" text-anchor="middle" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="48" font-weight="800" fill="#1F8A70">04</text>
    <text x="1084" y="238" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="800" fill="#182026">统一错误</text>
    <use data-icon="phosphor-duotone/code-block" x="984" y="294" width="36" height="36" fill="#3A86FF" />
    <text x="1034" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">Problem Details</text>
    <text x="984" y="364" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">
      <tspan x="984" dy="0">客户端稳定展示错误，</tspan>
      <tspan x="984" dy="26">服务端通过请求 ID</tspan>
      <tspan x="984" dy="26">关联日志和排查。</tspan>
    </text>
    <rect x="984" y="522" width="200" height="44" rx="14" fill="#EAF7EF" />
    <text x="1084" y="550" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="700" fill="#3A86FF">RFC 9457 style</text>
  </g>
  <g id="footer">
    <text x="56" y="690" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#74807C">API design · reliability details that judges can verify in code and docs</text>
  </g>
</svg>
