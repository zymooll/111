<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="hubFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F8A70"/>
      <stop offset="100%" stop-color="#3A86FF"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FBFFF7"/>
    <circle cx="640" cy="392" r="330" fill="#EAF7EF"/>
    <circle cx="640" cy="392" r="246" fill="none" stroke="#BFD9CC" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="640" cy="392" r="154" fill="none" stroke="#DCEBE3" stroke-width="2"/>
  </g>
  <g id="header">
    <text x="56" y="64" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="34" font-weight="800" fill="#182026">把 AI 放进边界里</text>
    <text x="56" y="96" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="700" fill="#4D5A57">敏感身份、原始搜索、评价原文和私有缓存不直接进入模型路径。</text>
    <text x="1224" y="72" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#74807C">13 / 16</text>
  </g>
  <g id="connection-lines">
    <line x1="640" y1="392" x2="640" y2="158" stroke="#BFD9CC" stroke-width="2" stroke-dasharray="6,8"/>
    <line x1="640" y1="392" x2="902" y2="266" stroke="#BFD9CC" stroke-width="2" stroke-dasharray="6,8"/>
    <line x1="640" y1="392" x2="884" y2="540" stroke="#BFD9CC" stroke-width="2" stroke-dasharray="6,8"/>
    <line x1="640" y1="392" x2="396" y2="540" stroke="#BFD9CC" stroke-width="2" stroke-dasharray="6,8"/>
    <line x1="640" y1="392" x2="378" y2="266" stroke="#BFD9CC" stroke-width="2" stroke-dasharray="6,8"/>
  </g>
  <g id="center-hub">
    <circle cx="640" cy="392" r="96" fill="url(#hubFill)"/>
    <circle cx="640" cy="392" r="78" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.45"/>
    <use data-icon="phosphor-duotone/shield-check" x="594" y="330" width="92" height="92" fill="#FFFFFF"/>
    <text x="640" y="454" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">安全边界</text>
  </g>
  <g id="spoke-audience">
    <rect x="520" y="112" width="240" height="92" rx="20" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5"/>
    <use data-icon="phosphor-duotone/lock-key" x="548" y="138" width="38" height="38" fill="#1F8A70"/>
    <text x="602" y="148" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">Audience 分离</text>
    <text x="602" y="174" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4D5A57">用户令牌与管理员令牌隔离</text>
  </g>
  <g id="spoke-password">
    <rect x="850" y="220" width="282" height="92" rx="20" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5"/>
    <use data-icon="phosphor-duotone/lock-key" x="878" y="246" width="38" height="38" fill="#3A86FF"/>
    <text x="932" y="256" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">密码安全哈希</text>
    <text x="932" y="282" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4D5A57">管理端不查看、不修改明文密码</text>
  </g>
  <g id="spoke-image">
    <rect x="842" y="494" width="290" height="92" rx="20" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5"/>
    <use data-icon="phosphor-duotone/check-circle" x="870" y="520" width="38" height="38" fill="#22A06B"/>
    <text x="924" y="530" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">图片重编码</text>
    <text x="924" y="556" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4D5A57">校验真实格式、像素并清除 EXIF</text>
  </g>
  <g id="spoke-ai-data">
    <rect x="148" y="494" width="298" height="92" rx="20" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5"/>
    <use data-icon="phosphor-duotone/brain" x="176" y="520" width="38" height="38" fill="#3A86FF"/>
    <text x="230" y="530" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">AI 数据最小化</text>
    <text x="230" y="556" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4D5A57">不发邮箱、令牌、账号 ID、评价原文</text>
  </g>
  <g id="spoke-cache">
    <rect x="142" y="220" width="306" height="92" rx="20" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5"/>
    <use data-icon="phosphor-duotone/cloud-check" x="170" y="246" width="38" height="38" fill="#1F8A70"/>
    <text x="224" y="256" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">PWA 缓存边界</text>
    <text x="224" y="282" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4D5A57">公开应用壳可缓存，个人响应不持久化</text>
  </g>
  <g id="bottom-rule">
    <rect x="394" y="628" width="492" height="46" rx="23" fill="#FFFFFF" stroke="#1F8A70" stroke-width="2"/>
    <text x="640" y="657" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#1F8A70">模型是增强层，不是隐私和权限边界的替代品</text>
  </g>
</svg>
