<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="softBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EAF7EF"/>
      <stop offset="100%" stop-color="#FBFFF7"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FBFFF7"/>
    <rect x="-80" y="130" width="650" height="430" rx="60" fill="url(#softBand)"/>
    <circle cx="1088" cy="562" r="210" fill="#FFB703" fill-opacity="0.12"/>
    <circle cx="1040" cy="150" r="120" fill="#3A86FF" fill-opacity="0.10"/>
  </g>
  <g id="header">
    <text x="56" y="78" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="700" fill="#1F8A70" letter-spacing="2">BACKGROUND AND PAIN</text>
    <text x="1224" y="78" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#74807C">02 / 16</text>
  </g>
  <g id="hero-question">
    <use data-icon="phosphor-duotone/warning" x="80" y="160" width="76" height="76" fill="#E45858"/>
    <text x="80" y="294" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="64" font-weight="800" fill="#182026">
      <tspan x="80" dy="0">选择太多，</tspan>
      <tspan x="80" dy="82">也是一种成本</tspan>
    </text>
    <text x="84" y="466" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="24" font-weight="700" fill="#1F8A70">校园餐饮不是缺信息，而是缺一条能快速做决定的路径。</text>
  </g>
  <g id="pain-chip-info">
    <rect x="705" y="150" width="390" height="62" rx="31" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="2"/>
    <text x="740" y="190" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="700" fill="#182026">信息分散</text>
    <text x="872" y="190" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#4D5A57">食堂、档口、菜品散在不同入口</text>
  </g>
  <g id="pain-chip-choice">
    <rect x="820" y="250" width="354" height="62" rx="31" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="2"/>
    <text x="855" y="290" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="700" fill="#182026">选择困难</text>
    <text x="987" y="290" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#4D5A57">平台告诉你去哪，不告诉你吃啥</text>
  </g>
  <g id="pain-chip-personal">
    <rect x="660" y="350" width="430" height="62" rx="31" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="2"/>
    <text x="695" y="390" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="700" fill="#182026">个体差异</text>
    <text x="827" y="390" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#4D5A57">预算、忌口、口味、活动区域都不同</text>
  </g>
  <g id="pain-chip-review">
    <rect x="790" y="450" width="384" height="62" rx="31" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="2"/>
    <text x="825" y="490" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="700" fill="#182026">评价治理</text>
    <text x="957" y="490" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#4D5A57">内容质量需要审核和回流</text>
  </g>
  <g id="pain-chip-location">
    <rect x="650" y="550" width="356" height="62" rx="31" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="2"/>
    <text x="685" y="590" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="700" fill="#182026">地点不熟</text>
    <text x="817" y="590" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#4D5A57">新生和跨校区学生更难判断</text>
  </g>
  <g id="footer">
    <text x="56" y="682" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#74807C">Hook · problem framing</text>
  </g>
</svg>
