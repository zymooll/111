<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowPrimary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1F8A70" />
    </marker>
    <linearGradient id="journeyLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A86FF" />
      <stop offset="55%" stop-color="#1F8A70" />
      <stop offset="100%" stop-color="#FFB703" />
    </linearGradient>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FBFFF7" />
    <rect x="42" y="118" width="1196" height="528" rx="26" fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" />
  </g>
  <g id="header">
    <text x="56" y="64" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="34" font-weight="800" fill="#182026">先体验，再登录贡献</text>
    <text x="56" y="96" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="700" fill="#4D5A57">先看、先选、先写，真正提交时再把内容归到账号。</text>
    <text x="1224" y="72" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#74807C">04 / 16</text>
  </g>
  <g id="stage-header">
    <rect x="246" y="146" width="178" height="44" rx="14" fill="#EAF7EF" />
    <text x="335" y="174" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="800" fill="#1F8A70">游客浏览</text>
    <rect x="444" y="146" width="178" height="44" rx="14" fill="#EAF7EF" />
    <text x="533" y="174" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="800" fill="#1F8A70">设置偏好</text>
    <rect x="642" y="146" width="178" height="44" rx="14" fill="#EAF7EF" />
    <text x="731" y="174" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="800" fill="#1F8A70">收藏商家</text>
    <rect x="840" y="146" width="178" height="44" rx="14" fill="#EAF7EF" />
    <text x="929" y="174" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="800" fill="#1F8A70">写评价草稿</text>
    <rect x="1038" y="146" width="154" height="44" rx="14" fill="#FFB703" fill-opacity="0.28" />
    <text x="1115" y="174" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="800" fill="#182026">登录发布</text>
  </g>
  <g id="row-labels">
    <text x="84" y="243" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">用户动作</text>
    <text x="84" y="351" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">系统怎么记</text>
    <text x="84" y="459" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">用户收益</text>
    <text x="84" y="567" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="800" fill="#182026">账号状态</text>
  </g>
  <g id="grid-lines">
    <line x1="218" y1="208" x2="218" y2="614" stroke="#DCEBE3" stroke-width="1.5" />
    <line x1="434" y1="208" x2="434" y2="614" stroke="#DCEBE3" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="632" y1="208" x2="632" y2="614" stroke="#DCEBE3" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="830" y1="208" x2="830" y2="614" stroke="#DCEBE3" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="1028" y1="208" x2="1028" y2="614" stroke="#DCEBE3" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="218" y1="310" x2="1192" y2="310" stroke="#DCEBE3" stroke-width="1.5" />
    <line x1="218" y1="418" x2="1192" y2="418" stroke="#DCEBE3" stroke-width="1.5" />
    <line x1="218" y1="526" x2="1192" y2="526" stroke="#DCEBE3" stroke-width="1.5" />
  </g>
  <g id="journey-cells">
    <text x="246" y="242" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">打开首页，看推荐</text>
    <text x="444" y="242" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">选择辣度/预算/区域</text>
    <text x="642" y="242" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">查看地图并点星标</text>
    <text x="840" y="242" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">先写评价草稿</text>
    <text x="1038" y="242" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">登录后恢复并提交</text>
    <text x="246" y="350" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">临时保存浏览状态</text>
    <text x="444" y="350" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">只记录口味偏好</text>
    <text x="642" y="350" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">收藏商家而非菜品</text>
    <text x="840" y="350" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">草稿等待身份绑定</text>
    <text x="1038" y="350" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">登录后自动合并</text>
    <text x="246" y="458" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">低门槛进入</text>
    <text x="444" y="458" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">推荐更贴近个人</text>
    <text x="642" y="458" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">下次更快找到</text>
    <text x="840" y="458" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">贡献意愿不被打断</text>
    <text x="1038" y="458" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57">评价进入公共信息池</text>
    <text x="246" y="566" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#74807C">匿名可用</text>
    <text x="444" y="566" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#74807C">只存偏好标签</text>
    <text x="642" y="566" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#74807C">游客收藏</text>
    <text x="840" y="566" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#74807C">本地草稿</text>
    <text x="1038" y="566" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="800" fill="#1F8A70">账号归属</text>
  </g>
  <g id="journey-path">
    <path d="M 250 636 C 386 602, 484 604, 594 588 S 770 556, 872 588 S 1044 634, 1168 592" fill="none" stroke="url(#journeyLine)" stroke-width="5" stroke-linecap="round" />
    <circle cx="250" cy="636" r="12" fill="#3A86FF" stroke="#FFFFFF" stroke-width="4" />
    <circle cx="500" cy="604" r="12" fill="#1F8A70" stroke="#FFFFFF" stroke-width="4" />
    <circle cx="720" cy="566" r="12" fill="#1F8A70" stroke="#FFFFFF" stroke-width="4" />
    <circle cx="930" cy="608" r="12" fill="#FFB703" stroke="#FFFFFF" stroke-width="4" />
    <circle cx="1168" cy="592" r="12" fill="#FFB703" stroke="#FFFFFF" stroke-width="4" />
  </g>
  <g id="persona-strip">
    <rect x="72" y="128" width="126" height="66" rx="20" fill="#EAF7EF" />
    <use data-icon="phosphor-duotone/student" x="92" y="146" width="30" height="30" fill="#1F8A70" />
    <text x="132" y="166" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">学生旅程</text>
    <use data-icon="phosphor-duotone/arrows-merge" x="164" y="222" width="28" height="28" fill="#3A86FF" />
    <use data-icon="phosphor-duotone/path" x="164" y="548" width="28" height="28" fill="#1F8A70" />
  </g>
</svg>
