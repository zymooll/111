    <text x="206" y="216" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="26" font-weight="800" fill="#182026">首页推荐</text>
    <text x="206" y="250" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1F8A70">打开即回答“今天吃什么”</text>
    <text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" fill="#4D5A57" x="112" y="302">搜索、品类、地点和预算筛选一起服务推荐流，</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" fill="#4D5A57" x="112" y="332">卡片展示菜名、商家、评分、价格和理由。</text></g>
