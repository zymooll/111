    <text x="206" y="510" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1F8A70">体验回流成公共信息</text>
    <text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" fill="#4D5A57" x="112" y="562">评价入口独立存在；游客可以先写草稿，提交时</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" fill="#4D5A57" x="112" y="592">再登录，图片和审核状态都可追踪。</text></g>
