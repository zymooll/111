    <text x="740" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">移动网络重试也安全</text>
    <text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="692" y="364">相同键和相同请求重放</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="692" y="390">原响应；相同键不同内容</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="692" y="416">返回 409。</text><path fill="#EAF7EF" d="M706,522 H886 A14,14 0 0 1 900,536 V552 A14,14 0 0 1 886,566 H706 A14,14 0 0 1 692,552 V536 A14,14 0 0 1 706,522 Z" />
    <text x="796" y="550" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="700" fill="#1F8A70">Idempotency-Key</text>
  </g>
