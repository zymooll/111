    <text x="1034" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">Problem Details</text>
    <text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="984" y="364">客户端稳定展示错误，</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="984" y="390">服务端通过请求 ID</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="984" y="416">关联日志和排查。</text><path fill="#EAF7EF" d="M998,522 H1170 A14,14 0 0 1 1184,536 V552 A14,14 0 0 1 1170,566 H998 A14,14 0 0 1 984,552 V536 A14,14 0 0 1 998,522 Z" />
    <text x="1084" y="550" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="700" fill="#3A86FF">RFC 9457 style</text>
