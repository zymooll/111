    <text x="444" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">持续加载不依赖 offset</text>
    <text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="396" y="364">推荐流、评价和后台列表</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="396" y="390">使用不透明游标，减少</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="396" y="416">新增数据带来的重复遗漏。</text><path fill="#EAF7EF" d="M410,522 H590 A14,14 0 0 1 604,536 V552 A14,14 0 0 1 590,566 H410 A14,14 0 0 1 396,552 V536 A14,14 0 0 1 410,522 Z" />
    <text x="500" y="550" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700" fill="#3A86FF">next_cursor</text>
  </g>
  <g id="pillar-idempotent">
    <path fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" d="M684,142 H908 A22,22 0 0 1 930,164 V608 A22,22 0 0 1 908,630 H684 A22,22 0 0 1 662,608 V164 A22,22 0 0 1 684,142 Z" />
