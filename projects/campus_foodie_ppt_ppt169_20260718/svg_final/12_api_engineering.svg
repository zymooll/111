  </g>
    <text x="148" y="314" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="800" fill="#182026">所有业务资源带 campus_id</text>
    <text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="100" y="364">服务端校验引用资源是否</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="100" y="390">属于同一校园，避免只靠</text><text font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#4D5A57" x="100" y="416">前端筛选造成数据越界。</text><path fill="#EAF7EF" d="M114,522 H294 A14,14 0 0 1 308,536 V552 A14,14 0 0 1 294,566 H114 A14,14 0 0 1 100,552 V536 A14,14 0 0 1 114,522 Z" />
