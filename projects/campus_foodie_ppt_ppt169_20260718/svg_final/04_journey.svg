  <defs>
    <marker id="arrowPrimary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1F8A70" />
    </marker>
    <linearGradient id="journeyLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A86FF" />
      <stop offset="55%" stop-color="#1F8A70" />
      <stop offset="100%" stop-color="#FFB703" />
    </linearGradient>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FBFFF7" />
    <path fill="#FFFFFF" stroke="#BFD9CC" stroke-width="1.5" d="M68,118 H1212 A26,26 0 0 1 1238,144 V620 A26,26 0 0 1 1212,646 H68 A26,26 0 0 1 42,620 V144 A26,26 0 0 1 68,118 Z" />
  </g>
  <g id="header">
    <text x="56" y="64" font-family="'Trebuchet MS', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="34" font-weight="800" fill="#182026">从游客到贡献者</text>
    <text x="56" y="96" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="700" fill="#4D5A57">产品先允许轻量浏览，再在关键动作上完成身份归属。</text>
    <text x="1224" y="72" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#74807C">04 / 16</text>
  </g>
